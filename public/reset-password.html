<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — PT Giofans Logistik</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-layout">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">🔑</div>
        <div class="auth-title">Reset Password</div>
        <div class="auth-subtitle">Masukkan email terdaftar kamu</div>
      </div>
      <div class="auth-body">
        <div id="alert-area"></div>
        <p style="font-size:.82rem;color:var(--text-muted);margin-bottom:16px;line-height:1.5;">
          Kami akan mengirimkan instruksi reset password ke alamat email kamu.
        </p>
        <div class="form-group mb-2">
          <label>Email <span class="required">*</span></label>
          <input type="email" id="email" placeholder="email@giofans.com" />
        </div>
        <button class="btn btn-primary w-full" onclick="doReset()">Kirim Link Reset</button>
        <div style="margin-top:14px;text-align:center;">
          <a href="login.html" style="font-size:.78rem;color:var(--primary);text-decoration:none;">← Kembali ke Login</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    function showAlert(msg, type = 'info') {
      document.getElementById('alert-area').innerHTML =
        `<div class="alert alert-${type}" style="margin-bottom:14px;">${msg}</div>`;
    }

    function doReset() {
      const email = document.getElementById('email').value.trim();
      if (!email) { showAlert('⚠️ Email wajib diisi.', 'danger'); return; }
      if (!/\S+@\S+\.\S+/.test(email)) { showAlert('⚠️ Format email tidak valid.', 'danger'); return; }
      showAlert('✅ Jika email terdaftar, link reset akan dikirimkan segera.', 'success');
    }
  </script>
</body>
</html>
